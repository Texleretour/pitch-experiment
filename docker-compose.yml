services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: pitch-experiment-backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=/app/apps/backend/data/experiment.db
      - CORS_ORIGIN=${FRONTEND_URL:-http://localhost}
    volumes:
      - backend-data:/app/apps/backend/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - app-network

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        - VITE_API_URL=${BACKEND_URL:-http://localhost:3000}
    container_name: pitch-experiment-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network

volumes:
  backend-data:
    driver: local

networks:
  app-network:
    driver: bridge